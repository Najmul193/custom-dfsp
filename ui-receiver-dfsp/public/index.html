<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receiver DFSP - Banking Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header {
      background: rgba(255,255,255,0.95);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .header h1 { color: #11998e; margin-bottom: 5px; }
    .header .status { font-size: 13px; color: #666; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .card h2 {
      color: #333;
      margin-bottom: 15px;
      font-size: 18px;
      border-bottom: 2px solid #f0f0f0;
      padding-bottom: 10px;
    }
    .balance-display {
      font-size: 32px;
      font-weight: bold;
      color: #11998e;
      margin-bottom: 10px;
    }
    .accounts-list {
      list-style: none;
      margin-bottom: 15px;
    }
    .accounts-list li {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      background: #f9f9f9;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .accounts-list .currency { font-weight: 600; color: #11998e; }
    .accounts-list .amount { color: #333; font-weight: 500; }
    .transaction-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #f9f9f9;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 13px;
      border-left: 4px solid #11998e;
    }
    .transaction-item .desc { flex: 1; }
    .transaction-item .amount {
      font-weight: 600;
      color: #38ef7d;
      min-width: 80px;
      text-align: right;
    }
    .transaction-item.success { border-left-color: #38ef7d; }
    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-badge.committed { background: #d4edda; color: #155724; }
    .status-badge.pending { background: #fff3cd; color: #856404; }
    .alert { padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; }
    .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
    .stat-box {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
    }
    .stat-value { font-size: 20px; font-weight: bold; color: #11998e; }
    .stat-label { font-size: 12px; color: #999; margin-top: 4px; }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏦 Receiver DFSP Banking Portal</h1>
      <p class="status">Secure Payment Receiving System | <span id="fspId">Loading...</span></p>
    </div>

    <div class="grid">
      <!-- Dashboard -->
      <div class="card">
        <h2>💰 Account Overview</h2>
        <div id="dashboardContent">Loading...</div>
      </div>

      <!-- Activity & Status -->
      <div class="card">
        <h2>📊 Activity Summary</h2>
        <div id="activityContent">Loading...</div>
      </div>
    </div>

    <!-- Recent Transactions -->
    <div class="card">
      <h2>📥 Incoming Transfers</h2>
      <div id="transactionsContent">Loading...</div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let dashboardData = null;

    async function loadDashboard() {
      try {
        const response = await fetch(`${API_BASE}/dashboard`);
        dashboardData = await response.json();
        
        document.getElementById('fspId').textContent = dashboardData.fspId;
        
        const html = `
          <div class="balance-display">+${dashboardData.totalBalance.toLocaleString()} XXX</div>
          <p style="color: #666; font-size: 13px; margin-bottom: 15px;">${dashboardData.accountHolder}</p>
          <h3 style="color: #333; font-size: 14px; margin-bottom: 10px;">Accounts by Currency</h3>
          <ul class="accounts-list">
            ${Object.entries(dashboardData.accounts).map(([curr, acc]) => `
              <li>
                <span class="currency">${curr}</span>
                <span class="amount">+${acc.balance.toLocaleString()}</span>
              </li>
            `).join('')}
          </ul>
        `;
        document.getElementById('dashboardContent').innerHTML = html;
      } catch (error) {
        document.getElementById('dashboardContent').innerHTML = `<div class="alert alert-info">Error loading dashboard</div>`;
      }
    }

    async function loadActivity() {
      try {
        const response = await fetch(`${API_BASE}/transactions`);
        const data = await response.json();
        
        const incoming = data.transactions.filter(t => t.type === 'TRANSFER_RECEIVED').length;
        const totalReceived = data.transactions
          .filter(t => t.type === 'TRANSFER_RECEIVED')
          .reduce((sum, t) => sum + t.amount, 0);

        const html = `
          <div class="alert alert-info">
            ✓ System is ready to receive transfers from any connected DFSP
          </div>
          <div class="stats-grid">
            <div class="stat-box">
              <div class="stat-value">${incoming}</div>
              <div class="stat-label">Total Received</div>
            </div>
            <div class="stat-box">
              <div class="stat-value">${totalReceived.toLocaleString()}</div>
              <div class="stat-label">Total Amount</div>
            </div>
          </div>
        `;
        document.getElementById('activityContent').innerHTML = html;
      } catch (error) {
        document.getElementById('activityContent').innerHTML = `<div class="alert alert-info">Loading activity...</div>`;
      }
    }

    async function loadTransactions() {
      try {
        const response = await fetch(`${API_BASE}/transactions?type=TRANSFER_RECEIVED`);
        const data = await response.json();
        
        if (data.transactions.length === 0) {
          document.getElementById('transactionsContent').innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">No incoming transfers yet. Waiting for senders...</p>';
          return;
        }

        const html = data.transactions.map(tx => `
          <div class="transaction-item success">
            <div class="desc">
              <strong>${tx.fromFsp}</strong><br>
              ${tx.description || 'Transfer'}<br>
              <small style="color: #999;">${new Date(tx.timestamp).toLocaleString()}</small>
            </div>
            <div style="text-align: center; margin: 0 15px;">
              <span class="status-badge committed">${tx.status}</span>
            </div>
            <div class="amount">+${tx.amount} ${tx.currency}</div>
          </div>
        `).join('');
        
        document.getElementById('transactionsContent').innerHTML = html;
      } catch (error) {
        document.getElementById('transactionsContent').innerHTML = `<div class="alert alert-info">Loading transfers...</div>`;
      }
    }

    // Initial load and refresh
    loadDashboard();
    loadActivity();
    loadTransactions();
    setInterval(() => {
      loadDashboard();
      loadActivity();
      loadTransactions();
    }, 3000);
  </script>
</body>
</html>
